name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Build server (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build ./cmd/supervpn-server

      - name: Build client (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build ./cmd/supervpn-client

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...
