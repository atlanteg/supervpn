name: CI / Release
run-name: "supervpn — ${{ github.event_name }} → ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS GUI clients (macos-latest runner — extra cost, off by default)'
        type: boolean
        default: false

jobs:
  # ── Compute version + detect what needs rebuilding ────────────────────────
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      ver:                ${{ steps.ver.outputs.ver }}
      rebuild_server_cli: ${{ steps.changes.outputs.server_cli }}
      rebuild_gui:        ${{ steps.changes.outputs.gui }}
      build_macos:        ${{ steps.flags.outputs.build_macos }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Compute version
        id: ver
        run: |
          VER="b$(git rev-list --count HEAD)"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "::notice title=supervpn version::$VER (commit $(git rev-parse --short HEAD))"
          echo "# supervpn $VER" >> "$GITHUB_STEP_SUMMARY"
          echo "commit: \`$(git rev-parse --short HEAD)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Detect what needs rebuilding
        id: changes
        run: |
          # On the very first push (no parent) or if the base is unreachable — rebuild all.
          BASE="${{ github.event.before }}"
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "server_cli=true" >> "$GITHUB_OUTPUT"
            echo "gui=true"        >> "$GITHUB_OUTPUT"
            echo "Reason: first push or base commit unavailable — full rebuild"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")
          echo "Changed files:"
          echo "$CHANGED"

          server_cli=false
          gui=false

          # Server / CLI / docs trigger server_cli job
          if echo "$CHANGED" | grep -qE \
            '^(cmd/supervpn-server/|cmd/supervpn-client/|internal/|pkg/|go\.(mod|sum)|README-user\.md)'; then
            server_cli=true
          fi

          # GUI (Walk + macOS Fyne + seema) trigger gui jobs
          if echo "$CHANGED" | grep -qE \
            '^(cmd/supervpn-client-gui/|cmd/supervpn-client-seema/|internal/|pkg/|go\.(mod|sum))'; then
            gui=true
          fi

          echo "server_cli=$server_cli" >> "$GITHUB_OUTPUT"
          echo "gui=$gui"               >> "$GITHUB_OUTPUT"
          echo "server_cli=$server_cli  gui=$gui" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve build flags
        id: flags
        run: |
          bm="${{ inputs.build_macos }}"
          echo "build_macos=${bm:-false}" >> "$GITHUB_OUTPUT"

      - name: Set run title
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"display_title\":\"supervpn $VER\"}")
          echo "$RESP" | grep -v '^HTTP_CODE' | head -5
          echo "$RESP" | grep 'HTTP_CODE'

  # ── Server + CLI clients (CGo-free, linux runner) ─────────────────────────
  build-server-cli:
    needs: [setup]
    if: needs.setup.outputs.rebuild_server_cli == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Pin go directive to 1.20
        run: sed -i 's/^go .*/go 1.20/' go.mod

      - name: Download dependencies
        run: go mod download

      # Exclude the GUI package — it requires CGo (Fyne) which needs GL/X11 headers
      # not present on ubuntu-latest.
      - name: Test (excluding GUI)
        run: go test -race $(go list ./... | grep -v 'supervpn-client-gui')

      - name: Vet (excluding GUI)
        run: go vet $(go list ./... | grep -v 'supervpn-client-gui')

      - name: Build server (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-server \
            ./cmd/supervpn-server

      - name: Build CLI client (windows/amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-windows-amd64.exe \
            ./cmd/supervpn-client

      - name: Build CLI client (darwin/amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-darwin-amd64 \
            ./cmd/supervpn-client

      - name: Build CLI client (darwin/arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-darwin-arm64 \
            ./cmd/supervpn-client

      - name: Build CLI client (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-linux-amd64 \
            ./cmd/supervpn-client

      - name: Build CLI client (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-linux-arm64 \
            ./cmd/supervpn-client

      - name: Generate user guide PDF
        run: |
          pip install weasyprint --quiet
          sudo apt-get install -y --no-install-recommends \
            pandoc libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 2>/dev/null || true
          pandoc README-user.md \
            --pdf-engine=weasyprint \
            --metadata title="superVPN — руководство пользователя" \
            -o dist/README-user.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: server-cli-binaries
          path: dist/

  # ── GUI clients — macOS (CGo required; both arches from arm64 runner) ───────
  # macos-13 (Intel) is effectively deprecated — no runners available.
  # Cross-compile amd64 from Apple Silicon using -arch x86_64 clang flags.
  build-gui-macos:
    needs: [setup]
    if: needs.setup.outputs.rebuild_gui == 'true' && needs.setup.outputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Pin go directive to 1.20
        run: sed -i '' 's/^go .*/go 1.20/' go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build GUI client (darwin/arm64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-gui-darwin-arm64 \
            ./cmd/supervpn-client-gui

      - name: Build GUI client (darwin/amd64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-gui-darwin-amd64 \
            ./cmd/supervpn-client-gui

      # Build a universal .app bundle so users can double-click without Terminal.
      - name: Create superVPN.app bundle (universal)
        run: |
          mkdir -p dist/superVPN.app/Contents/MacOS
          lipo -create \
            dist/supervpn-client-gui-darwin-arm64 \
            dist/supervpn-client-gui-darwin-amd64 \
            -output dist/superVPN.app/Contents/MacOS/superVPN
          cp cmd/supervpn-client-gui/Info.plist dist/superVPN.app/Contents/Info.plist
          cd dist && zip -r superVPN-macos.zip superVPN.app

      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos-binaries
          path: dist/

  # ── GUI client — Windows/Walk (pure Win32/GDI, no CGo, no OpenGL) ────────
  # walk uses Win32 syscalls — works on RDP, Hyper-V, and any VM without GPU.
  # TAP driver files are downloaded and embedded so the binary can self-install
  # the tap0901 driver via pnputil without any external tools.
  build-gui-windows:
    needs: [setup]
    if: needs.setup.outputs.rebuild_gui == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Pin go directive to 1.20
        shell: pwsh
        run: (Get-Content go.mod) -replace '^go .*', 'go 1.20' | Set-Content go.mod

      - name: Download dependencies
        run: go mod download

      - name: Download wintun.dll + tap-windows6 driver files + Npcap installer
        continue-on-error: true
        shell: pwsh
        run: |
          # ── wintun.dll (amd64) ────────────────────────────────────────────────
          try {
            Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" `
              -OutFile wintun.zip -UseBasicParsing
            Expand-Archive wintun.zip -DestinationPath wintun-pkg -Force
            $dll = "wintun-pkg\wintun\bin\amd64\wintun.dll"
            if (Test-Path $dll) {
              Copy-Item $dll -Destination "pkg\tun\wintun-dll\wintun.dll" -Force
              Write-Host "wintun.dll embedded: $((Get-Item $dll).Length) bytes"
            } else {
              Write-Warning "wintun.dll not at expected path — listing zip contents:"
              Get-ChildItem wintun-pkg -Recurse -Filter "*.dll"
            }
          } catch { Write-Warning "wintun.dll download failed: $_" }

          # ── tap-windows6 driver files ─────────────────────────────────────────
          $tapOk = $false
          $tapUrls = @(
            "https://github.com/OpenVPN/tap-windows6/releases/download/9.26.0.0/tap-windows-9.26.0.0.exe",
            "https://github.com/OpenVPN/tap-windows6/releases/download/9.24.6.0/tap-windows-9.24.6.exe"
          )
          foreach ($url in $tapUrls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile tap-windows.exe -UseBasicParsing
              7z x tap-windows.exe -otap-extract -y | Out-Null
              $files = Get-ChildItem -Recurse tap-extract `
                -Include "OemVista.inf","tap0901.sys","tap0901.cat"
              if ($files.Count -ge 3) {
                $files | Copy-Item -Destination pkg\tun\tap-driver\ -Force
                Write-Host "TAP driver files embedded:"
                Get-ChildItem pkg\tun\tap-driver\
                $tapOk = $true
                break
              }
              Write-Warning "Only $($files.Count) driver files found in $url"
            } catch { Write-Warning "TAP download from $url failed: $_" }
          }
          if (-not $tapOk) {
            Write-Warning "TAP driver not embedded — binary falls back to disk install"
          }

          # ── 386 (x86 / i386) variants for the 32-bit Win7 GUI build ───────────
          # Staged into staging386\ (NOT the embed dirs) so the amd64 builds above
          # keep their amd64 embeds; the 386 build step swaps these in just before
          # it compiles.
          New-Item -ItemType Directory -Force -Path staging386\wintun, staging386\tap, staging386\winpcap | Out-Null
          try {
            Invoke-WebRequest -Uri "https://www.winpcap.org/install/bin/WinPcap_4_1_3.exe" `
              -OutFile staging386\winpcap\WinPcap_4_1_3.exe -UseBasicParsing
            Write-Host "staged WinPcap 4.1.3: $((Get-Item 'staging386\winpcap\WinPcap_4_1_3.exe').Length) bytes"
          } catch { Write-Warning "WinPcap download failed: $_" }
          try {
            $dll86 = "wintun-pkg\wintun\bin\x86\wintun.dll"
            if (Test-Path $dll86) {
              Copy-Item $dll86 -Destination staging386\wintun\wintun.dll -Force
              Write-Host "staged 386 wintun.dll: $((Get-Item $dll86).Length) bytes"
            } else { Write-Warning "386 wintun.dll not found at $dll86" }
          } catch { Write-Warning "386 wintun stage failed: $_" }
          try {
            if (Test-Path tap-extract) {
              $sys86 = Get-ChildItem -Recurse tap-extract -Filter tap0901.sys |
                Where-Object { $_.FullName -match '\\i386\\' -or $_.FullName -match '\\x86\\' } |
                Select-Object -First 1
              if ($sys86) {
                $dir = $sys86.Directory.FullName
                Copy-Item (Join-Path $dir 'tap0901.sys')  staging386\tap\ -Force
                Copy-Item (Join-Path $dir 'tap0901.cat')  staging386\tap\ -Force -EA SilentlyContinue
                Copy-Item (Join-Path $dir 'OemVista.inf') staging386\tap\ -Force -EA SilentlyContinue
                if (-not (Test-Path staging386\tap\OemVista.inf)) {
                  Get-ChildItem -Recurse tap-extract -Filter OemVista.inf | Select-Object -First 1 | Copy-Item -Destination staging386\tap\ -Force
                }
                if (-not (Test-Path staging386\tap\tap0901.cat)) {
                  Get-ChildItem -Recurse tap-extract -Filter tap0901.cat | Where-Object { $_.FullName -match 'i386|x86' } | Select-Object -First 1 | Copy-Item -Destination staging386\tap\ -Force
                }
                Write-Host "staged 386 TAP driver:"; Get-ChildItem staging386\tap\
              } else { Write-Warning "386 tap0901.sys (i386) not found in installer" }
            }
          } catch { Write-Warning "386 TAP stage failed: $_" }

          # ── Npcap installer ───────────────────────────────────────────────────
          try {
            Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-1.88.exe" `
              -OutFile "pkg\tun\npcap-installer\npcap-1.88.exe" -UseBasicParsing
            Write-Host "Npcap installer embedded: $((Get-Item 'pkg\tun\npcap-installer\npcap-1.88.exe').Length) bytes"
          } catch { Write-Warning "Npcap installer download failed: $_" }

      - name: Embed app icon into rsrc_windows_amd64.syso
        shell: pwsh
        run: |
          # Use icon.ico if present; fall back to icon.png; last resort: generated placeholder.
          $icon = "cmd\supervpn-client-gui\icon.ico"
          if (-not (Test-Path $icon)) {
            $icon = "cmd\supervpn-client-gui\icon.png"
            if (-not (Test-Path $icon)) {
              Write-Host "No icon found — generating green-circle placeholder"
              go run cmd\supervpn-client-gui\gen_icon.go
            }
          }
          Write-Host "Using icon: $icon ($((Get-Item $icon).Length) bytes)"
          go install github.com/tc-hib/go-winres@latest
          Push-Location cmd\supervpn-client-gui
          go-winres simply --icon $icon.Replace("cmd\supervpn-client-gui\", "") --manifest gui --arch amd64
          Pop-Location
          Write-Host "syso size: $((Get-Item 'cmd\supervpn-client-gui\rsrc_windows_amd64.syso').Length) bytes"

      - name: Build GUI client Walk (windows/amd64)
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $VER = "${{ needs.setup.outputs.ver }}"
          go build `
            -ldflags="-s -w -H windowsgui -X main.version=$VER" `
            -o dist/supervpn-client-gui-windows-amd64.exe `
            ./cmd/supervpn-client-gui

      - name: Build seema client (windows/amd64)
        shell: pwsh
        run: |
          # Generate seema-specific syso with its own blue-rat icon.
          $icon = "cmd\supervpn-client-seema\icon.ico"
          Write-Host "seema icon: $icon ($((Get-Item $icon).Length) bytes)"
          Push-Location cmd\supervpn-client-seema
          go-winres simply --icon icon.ico --manifest gui --arch amd64
          Pop-Location
          Write-Host "seema syso: $((Get-Item 'cmd\supervpn-client-seema\rsrc_windows_amd64.syso').Length) bytes"
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $VER = "${{ needs.setup.outputs.ver }}"
          go build `
            -ldflags="-s -w -H windowsgui -X main.version=$VER" `
            -o dist/supervpn-seema-windows-amd64.exe `
            ./cmd/supervpn-client-seema

      - name: Build GUI client Walk (windows/386 — 32-bit Win7)
        shell: pwsh
        run: |
          # Swap the embedded driver binaries to their 32-bit variants so the 386
          # exe ships a matching wintun.dll / tap0901.sys. The amd64 builds above
          # already consumed the amd64 embeds, so overwriting now is safe.
          if (Test-Path staging386\wintun\wintun.dll) {
            Copy-Item staging386\wintun\wintun.dll pkg\tun\wintun-dll\wintun.dll -Force
            Write-Host "386 wintun.dll embedded"
          } else { Write-Warning "no 386 wintun.dll staged — exe will need a system wintun.dll" }
          if (Test-Path staging386\tap\tap0901.sys) {
            Copy-Item staging386\tap\* pkg\tun\tap-driver\ -Force
            Write-Host "386 TAP driver embedded"
          } else { Write-Warning "no 386 TAP driver staged — falls back to disk install" }
          # Embed the WinPcap installer alongside Npcap: on Win7 the runtime picks
          # WinPcap (Npcap drivers >1.79 are rejected there post cross-cert expiry).
          if (Test-Path staging386\winpcap\WinPcap_4_1_3.exe) {
            Copy-Item staging386\winpcap\WinPcap_4_1_3.exe pkg\tun\npcap-installer\ -Force
            Write-Host "386 WinPcap installer embedded"
          } else { Write-Warning "no WinPcap installer staged — 386 build falls back to Npcap" }

          $icon = "cmd\supervpn-client-gui\icon.ico"
          if (-not (Test-Path $icon)) { $icon = "cmd\supervpn-client-gui\icon.png" }
          Push-Location cmd\supervpn-client-gui
          go-winres simply --icon $icon.Replace("cmd\supervpn-client-gui\", "") --manifest gui --arch 386
          Pop-Location

          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "386"
          $VER = "${{ needs.setup.outputs.ver }}"
          go build `
            -ldflags="-s -w -H windowsgui -X main.version=$VER" `
            -o dist/supervpn-client-gui-windows-386.exe `
            ./cmd/supervpn-client-gui

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: dist/

  # ── Publish release (push to main only, waits for all builds) ─────────────
  release:
    # Run even when some build jobs were skipped (not cancelled/failed).
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !failure() && !cancelled()
    needs: [setup, build-server-cli, build-gui-macos, build-gui-windows]
    runs-on: ubuntu-latest
    # contents:write lets the built-in GITHUB_TOKEN publish the release to this
    # CI repo (atlantegsrb/supervpn) itself. The atlanteg/* repos use GH_PAT.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # Download artifacts from jobs that actually ran.
      - if: needs.build-server-cli.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: server-cli-binaries
          path: dist/

      - if: needs.build-gui-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: gui-macos-binaries
          path: dist/

      - if: needs.build-gui-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: gui-windows-amd64
          path: dist/

      # For skipped jobs, pull the corresponding files from the previous release
      # so every release always contains the full set of binaries.
      - name: Fill missing binaries from previous release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p dist
          # The current release has not been published yet at this point,
          # so .[0] is the previous release — use it to fill skipped build artifacts.
          PREV=$(gh release list --repo atlanteg/supervpn-releases \
            --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "No previous release found — skipping fill step"
            exit 0
          fi
          echo "Previous release: $PREV"

          fill() {
            local pattern="$1"
            gh release download "$PREV" \
              --repo atlanteg/supervpn-releases \
              --pattern "$pattern" \
              --dir dist/ --clobber 2>/dev/null \
              && echo "  filled: $pattern" || echo "  not found in prev: $pattern"
          }

          if [ "${{ needs.build-server-cli.result }}" = "skipped" ]; then
            echo "Filling server/CLI artifacts from $PREV..."
            fill "supervpn-server"
            fill "supervpn-client-windows-amd64.exe"
            fill "supervpn-client-darwin-amd64"
            fill "supervpn-client-darwin-arm64"
            fill "supervpn-client-linux-amd64"
            fill "supervpn-client-linux-arm64"
            fill "README-user.pdf"
          fi

          if [ "${{ needs.build-gui-macos.result }}" = "skipped" ]; then
            echo "Filling macOS GUI artifacts from $PREV..."
            fill "supervpn-client-gui-darwin-amd64"
            fill "supervpn-client-gui-darwin-arm64"
            fill "superVPN-macos.zip"
          fi

          if [ "${{ needs.build-gui-windows.result }}" = "skipped" ]; then
            echo "Filling Windows GUI artifacts from $PREV..."
            fill "supervpn-client-gui-windows-amd64.exe"
            fill "supervpn-client-gui-windows-386.exe"
            fill "supervpn-seema-windows-amd64.exe"
          fi

      - name: Fix permissions on unix executables
        run: |
          chmod +x dist/supervpn-server dist/supervpn-client-darwin-* \
            dist/supervpn-client-gui-darwin-* 2>/dev/null || true

      - name: Assemble dist subdirs and package zips
        run: |
          # Copy fresh binaries into the subdirectory templates so configs,
          # scripts and driver files are bundled alongside the binary.
          cp dist/supervpn-server                   dist/linux/supervpn-server
          cp dist/supervpn-client-windows-amd64.exe dist/windows/supervpn-client.exe
          cp dist/supervpn-client-darwin-amd64      dist/macos/supervpn-client-amd64
          cp dist/supervpn-client-darwin-arm64      dist/macos/supervpn-client-arm64
          chmod +x dist/linux/supervpn-server dist/macos/supervpn-client-*

          # supervpn-dist.zip — full package: linux/ + windows/ + macos/ with configs.
          (cd dist && zip -r ../supervpn-dist.zip linux/ windows/ macos/)

          # Per-platform convenience zips.
          # Note: no supervpn-macos.zip — it would conflict case-insensitively
          # with superVPN-macos.zip (the macOS GUI app bundle from build-gui-macos).
          # macOS CLI clients are included in supervpn-dist.zip under macos/.
          (cd dist && zip -r ../supervpn-linux.zip   linux/)
          (cd dist && zip -r ../supervpn-windows.zip windows/)

      - name: Publish release to all three repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CI_TOKEN: ${{ github.token }}
        run: |
          VER="${{ needs.setup.outputs.ver }}"
          COMMIT=$(git rev-parse --short HEAD)
          # Build file list dynamically — skip any asset that wasn't produced.
          FILES=()
          for f in \
            supervpn-dist.zip supervpn-linux.zip supervpn-windows.zip \
            dist/supervpn-server dist/supervpn-client-windows-amd64.exe \
            dist/supervpn-client-darwin-amd64 dist/supervpn-client-darwin-arm64 \
            dist/supervpn-client-linux-amd64 dist/supervpn-client-linux-arm64 \
            dist/supervpn-client-gui-windows-amd64.exe dist/supervpn-client-gui-windows-386.exe \
            dist/supervpn-client-gui-darwin-amd64 dist/supervpn-client-gui-darwin-arm64 \
            dist/superVPN-macos.zip dist/supervpn-seema-windows-amd64.exe dist/README-user.pdf; do
            if [ -f "$f" ]; then FILES+=("$f"); else echo "::warning::Asset not found, skipping: $f"; fi
          done
          WANT=${#FILES[@]}

          # publish_to <repo> <token>: (re)create the release shell via the REST
          # API — gh release create's tag path intermittently fails with a spurious
          # "workflow scope" error — then upload only-missing assets with retries.
          # Returns non-zero if it could not reach WANT assets.
          publish_to() {
            local repo="$1" tok="$2"
            echo "──────── $repo  ($VER → $WANT assets) ────────"
            if GH_TOKEN="$tok" gh api "repos/$repo/releases/tags/$VER" >/tmp/er.json 2>/dev/null; then
              local id; id=$(jq -r '.id // empty' /tmp/er.json)
              GH_TOKEN="$tok" gh api --method DELETE "repos/$repo/releases/$id" >/dev/null 2>&1 || true
              GH_TOKEN="$tok" gh api --method DELETE "repos/$repo/git/refs/tags/$VER" >/dev/null 2>&1 || true
            fi
            local ok=""
            for i in $(seq 1 6); do
              if GH_TOKEN="$tok" gh release view "$VER" --repo "$repo" >/dev/null 2>&1; then ok=1; break; fi
              GH_TOKEN="$tok" gh api --method POST "repos/$repo/releases" \
                -f tag_name="$VER" -f name="supervpn $VER" \
                -f body="Build $VER — commit $COMMIT" -f make_latest=true >/dev/null 2>&1 || true
              sleep 5
            done
            if [ -z "$ok" ]; then echo "::warning::$repo: could not create release shell"; return 1; fi
            local cnt=0
            for pass in $(seq 1 8); do
              local present; present=$(GH_TOKEN="$tok" gh release view "$VER" --repo "$repo" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
              for f in "${FILES[@]}"; do
                local name; name=$(basename "$f")
                if printf '%s\n' "$present" | grep -qxF "$name"; then continue; fi
                GH_TOKEN="$tok" gh release upload "$VER" "$f" --repo "$repo" >/dev/null 2>&1 || true
              done
              sleep 3
              cnt=$(GH_TOKEN="$tok" gh release view "$VER" --repo "$repo" --json assets --jq '.assets | length' 2>/dev/null || echo 0)
              cnt=${cnt:-0}
              echo "  $repo pass $pass: $cnt/$WANT"
              [ "$cnt" -ge "$WANT" ] && break
            done
            [ "$cnt" -ge "$WANT" ]
          }

          # atlanteg/supervpn-releases is REQUIRED — the update system reads from it.
          # atlantegsrb/supervpn publishes reliably via the built-in GITHUB_TOKEN.
          # The two atlanteg/* targets use GH_PAT; the source mirror is best-effort
          # so a token permission gap there can't block the critical release.
          REQ_OK=1
          publish_to "atlanteg/supervpn-releases" "$GH_PAT"   || REQ_OK=0
          publish_to "atlantegsrb/supervpn"        "$CI_TOKEN" || echo "::warning::atlantegsrb/supervpn release incomplete"
          publish_to "atlanteg/supervpn"           "$GH_PAT"   || echo "::warning::atlanteg/supervpn release incomplete (GH_PAT may lack write access there)"
          if [ "$REQ_OK" -ne 1 ]; then
            echo "::error::Critical release to atlanteg/supervpn-releases incomplete."
            exit 1
          fi
          echo "All publishes attempted."

      - name: Sync user guide to supervpn-releases repo
        # Auxiliary: the user guide is already a release asset (README-user.pdf).
        # This copies it into the releases repo root for convenience. A push
        # permission hiccup here must NOT fail the job — the release is published.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/atlanteg/supervpn-releases.git" \
            releases-repo
          cp README-user.md releases-repo/README-user.md
          cp dist/README-user.pdf releases-repo/README-user.pdf
          cd releases-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/atlanteg/supervpn-releases.git"
          git add README-user.md README-user.pdf
          if ! git diff --cached --quiet; then
            VER="${{ needs.setup.outputs.ver }}"
            git commit -m "docs: sync user guide $VER"
            git push || echo "::warning::user-guide sync push failed (non-fatal; PDF is still a release asset)"
          fi
