name: CI / Release
run-name: "supervpn — ${{ github.event_name }} → ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Compute version once; all other jobs inherit it via needs.setup.outputs ──
  setup:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.ver.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          VER="b$(git rev-list --count HEAD)"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "::notice title=supervpn version::$VER (commit $(git rev-parse --short HEAD))"
          echo "# supervpn $VER" >> "$GITHUB_STEP_SUMMARY"
          echo "commit: \`$(git rev-parse --short HEAD)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set run title
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"display_title\":\"supervpn $VER\"}")
          echo "$RESP" | grep -v '^HTTP_CODE' | head -5
          echo "$RESP" | grep 'HTTP_CODE'

  # ── Server + CLI clients (CGo-free, linux runner) ─────────────────────────
  build-server-cli:
    needs: [setup]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      # Exclude the GUI package — it requires CGo (Fyne) which needs GL/X11 headers
      # not present on ubuntu-latest.
      - name: Test (excluding GUI)
        run: go test -race $(go list ./... | grep -v 'supervpn-client-gui')

      - name: Vet (excluding GUI)
        run: go vet $(go list ./... | grep -v 'supervpn-client-gui')

      - name: Build server (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-server \
            ./cmd/supervpn-server

      - name: Build CLI client (windows/amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-windows-amd64.exe \
            ./cmd/supervpn-client

      - name: Build CLI client (darwin/amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-darwin-amd64 \
            ./cmd/supervpn-client

      - name: Build CLI client (darwin/arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-darwin-arm64 \
            ./cmd/supervpn-client

      - name: Generate user guide PDF
        run: |
          pip install weasyprint --quiet
          sudo apt-get install -y --no-install-recommends \
            pandoc libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 2>/dev/null || true
          pandoc README-user.md \
            --pdf-engine=weasyprint \
            --metadata title="superVPN — руководство пользователя" \
            -o dist/README-user.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: server-cli-binaries
          path: dist/

  # ── GUI clients — macOS (CGo required; both arches from arm64 runner) ───────
  # macos-13 (Intel) is effectively deprecated — no runners available.
  # Cross-compile amd64 from Apple Silicon using -arch x86_64 clang flags.
  build-gui-macos:
    needs: [setup]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Build GUI client (darwin/arm64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-gui-darwin-arm64 \
            ./cmd/supervpn-client-gui

      - name: Build GUI client (darwin/amd64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build \
            -ldflags="-s -w -X main.version=${{ needs.setup.outputs.ver }}" \
            -o dist/supervpn-client-gui-darwin-amd64 \
            ./cmd/supervpn-client-gui

      # Build a universal .app bundle so users can double-click without Terminal.
      - name: Create superVPN.app bundle (universal)
        run: |
          mkdir -p dist/superVPN.app/Contents/MacOS
          lipo -create \
            dist/supervpn-client-gui-darwin-arm64 \
            dist/supervpn-client-gui-darwin-amd64 \
            -output dist/superVPN.app/Contents/MacOS/superVPN
          cp cmd/supervpn-client-gui/Info.plist dist/superVPN.app/Contents/Info.plist
          cd dist && zip -r superVPN-macos.zip superVPN.app

      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos-binaries
          path: dist/

  # ── GUI client — Windows/Walk (pure Win32/GDI, no CGo, no OpenGL) ────────
  # walk uses Win32 syscalls — works on RDP, Hyper-V, and any VM without GPU.
  # TAP driver files are downloaded and embedded so the binary can self-install
  # the tap0901 driver via pnputil without any external tools.
  build-gui-windows:
    needs: [setup]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Download tap-windows6 driver files
        continue-on-error: true
        shell: pwsh
        run: |
          # Download the signed NSIS installer from OpenVPN GitHub releases and
          # extract driver files using 7-Zip (always available on windows-latest).
          # continue-on-error: true so a network hiccup never blocks the build —
          # the binary just falls back to disk-based installation at runtime.
          $url = "https://github.com/OpenVPN/tap-windows6/releases/download/9.26.0.0/tap-windows-9.26.0.0.exe"
          Invoke-WebRequest -Uri $url -OutFile tap-windows.exe -UseBasicParsing
          7z x tap-windows.exe -otap-extract -y | Out-Null
          $files = Get-ChildItem -Recurse tap-extract -Include "OemVista.inf","tap0901.sys","tap0901.cat"
          if ($files) {
            $files | Copy-Item -Destination pkg/tun/tap-driver/ -Force
            Write-Host "Driver files embedded:"
            Get-ChildItem pkg/tun/tap-driver/
          } else {
            Write-Warning "Driver files not found in extracted installer — binary will fall back to disk installation"
          }

      - name: Build GUI client Walk (windows/amd64)
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $VER = "${{ needs.setup.outputs.ver }}"
          go build `
            -ldflags="-s -w -H windowsgui -X main.version=$VER" `
            -o dist/supervpn-client-gui-windows-amd64.exe `
            ./cmd/supervpn-client-gui

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: dist/

  # ── GUI client — Windows/Fyne (OpenGL via MSYS2, falls back to SW renderer) ─
  # Build the Fyne variant with -tags fyne for users who prefer it on systems
  # with a real GPU (not RDP / Hyper-V).
  build-gui-windows-fyne:
    needs: [setup]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup MSYS2 (MinGW-w64 + OpenGL)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-mesa
          path-type: inherit

      - name: Download dependencies
        run: go mod download

      - name: Download tap-windows6 driver files
        continue-on-error: true
        shell: pwsh
        run: |
          $url = "https://github.com/OpenVPN/tap-windows6/releases/download/9.26.0.0/tap-windows-9.26.0.0.exe"
          Invoke-WebRequest -Uri $url -OutFile tap-windows.exe -UseBasicParsing
          7z x tap-windows.exe -otap-extract -y | Out-Null
          $files = Get-ChildItem -Recurse tap-extract -Include "OemVista.inf","tap0901.sys","tap0901.cat"
          if ($files) {
            $files | Copy-Item -Destination pkg/tun/tap-driver/ -Force
          }

      - name: Build GUI client Fyne (windows/amd64)
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          VER="${{ needs.setup.outputs.ver }}"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build \
            -tags fyne \
            -ldflags="-s -w -H windowsgui -X main.version=${VER}" \
            -o dist/supervpn-client-gui-windows-fyne-amd64.exe \
            ./cmd/supervpn-client-gui

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-fyne-amd64
          path: dist/

  # ── Publish release (push to main only, waits for all builds) ─────────────
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [setup, build-server-cli, build-gui-macos, build-gui-windows, build-gui-windows-fyne]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: server-cli-binaries
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: gui-macos-binaries
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: gui-windows-amd64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: gui-windows-fyne-amd64
          path: dist/

      - name: Fix permissions on unix executables
        run: chmod +x dist/supervpn-server dist/supervpn-client-darwin-* dist/supervpn-client-gui-darwin-*

      - name: Package zip (all binaries)
        run: |
          cd dist
          zip -j ../supervpn-dist.zip \
            supervpn-server \
            supervpn-client-windows-amd64.exe \
            supervpn-client-darwin-amd64 \
            supervpn-client-darwin-arm64 \
            supervpn-client-gui-windows-amd64.exe \
            supervpn-client-gui-windows-fyne-amd64.exe \
            supervpn-client-gui-darwin-amd64 \
            supervpn-client-gui-darwin-arm64 \
            README-user.pdf

      - name: Publish release to supervpn-releases
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VER="${{ needs.setup.outputs.ver }}"
          gh release create "$VER" \
            supervpn-dist.zip \
            dist/supervpn-server \
            dist/supervpn-client-windows-amd64.exe \
            dist/supervpn-client-darwin-amd64 \
            dist/supervpn-client-darwin-arm64 \
            dist/supervpn-client-gui-windows-amd64.exe \
            dist/supervpn-client-gui-windows-fyne-amd64.exe \
            dist/supervpn-client-gui-darwin-amd64 \
            dist/supervpn-client-gui-darwin-arm64 \
            dist/superVPN-macos.zip \
            dist/README-user.pdf \
            --repo atlanteg/supervpn-releases \
            --title "supervpn $VER" \
            --notes "Build $VER — commit $(git rev-parse --short HEAD)" \
            --latest
