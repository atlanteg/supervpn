name: CI / Release
run-name: "supervpn — ${{ github.event_name }} → ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # required to update the run display title

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git rev-list --count

      - name: Compute version
        id: ver
        run: |
          VER="b$(git rev-list --count HEAD)"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "::notice title=supervpn version::$VER (commit $(git rev-parse --short HEAD))"
          echo "# supervpn $VER" >> "$GITHUB_STEP_SUMMARY"
          echo "commit: \`$(git rev-parse --short HEAD)\`" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build server (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.ver }}" \
            -o dist/linux/supervpn-server \
            ./cmd/supervpn-server

      - name: Build client (windows/amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.ver }}" \
            -o dist/windows/supervpn-client.exe \
            ./cmd/supervpn-client

      - name: Build client (darwin/amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.ver }}" \
            -o dist/macos/supervpn-client-amd64 \
            ./cmd/supervpn-client

      - name: Build client (darwin/arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.ver }}" \
            -o dist/macos/supervpn-client-arm64 \
            ./cmd/supervpn-client

      - name: Package zip
        run: |
          cd dist
          zip -r ../supervpn-dist.zip linux windows macos --exclude "**/.DS_Store"

      # Only publish a release on direct pushes to main (not on PRs).
      # Requires a repository secret GH_PAT — a Personal Access Token with
      # repo scope on atlanteg/supervpn-releases.
      - name: Prepare release assets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp dist/linux/supervpn-server supervpn-server
          cp dist/windows/supervpn-client.exe supervpn-client-windows-amd64.exe
          cp dist/macos/supervpn-client-amd64 supervpn-client-darwin-amd64
          cp dist/macos/supervpn-client-arm64 supervpn-client-darwin-arm64

      - name: Publish release to supervpn-releases
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create ${{ steps.ver.outputs.ver }} \
            supervpn-dist.zip \
            supervpn-server \
            supervpn-client-windows-amd64.exe \
            supervpn-client-darwin-amd64 \
            supervpn-client-darwin-arm64 \
            --repo atlanteg/supervpn-releases \
            --title "supervpn ${{ steps.ver.outputs.ver }}" \
            --notes "Build ${{ steps.ver.outputs.ver }} — commit $(git rev-parse --short HEAD)" \
            --latest
