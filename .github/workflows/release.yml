name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release and upload assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

      - name: Build server (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o supervpn-server-linux-amd64 ./cmd/supervpn-server

      - name: Build client (windows/amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o supervpn-client-windows-amd64.exe ./cmd/supervpn-client

      - name: Build client (darwin/amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o supervpn-client-darwin-amd64 ./cmd/supervpn-client

      - name: Build client (darwin/arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o supervpn-client-darwin-arm64 ./cmd/supervpn-client

      - name: Package Windows client
        run: |
          # wintun.dll — for direct mode (L3 WinTun)
          curl -fsSL https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          unzip -j wintun.zip "wintun-0.14.1/bin/amd64/wintun.dll" -d .

          # tap-windows6 installer — for bridge mode (L2 TAP)
          # Using the latest signed release from OpenVPN's tap-windows6 project.
          curl -fsSL https://github.com/OpenVPN/tap-windows6/releases/download/9.26.0.0/tap-windows-9.26.0.exe \
            -o tap-windows6-installer.exe

          # Bundle everything into a single zip
          zip supervpn-client-windows-amd64.zip \
            supervpn-client-windows-amd64.exe \
            wintun.dll \
            tap-windows6-installer.exe \
            configs/client.toml.example \
            deploy/setup-bridge-netbridge.ps1 \
            deploy/setup-bridge-hyperv.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: supervpn ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            supervpn-server-linux-amd64
            supervpn-client-windows-amd64.zip
            supervpn-client-darwin-amd64
            supervpn-client-darwin-arm64
            configs/server.toml.example
            configs/client.toml.example
            deploy/supervpn-server.service
